<script>
    let num
    do {
                num = Number(prompt("Número: "))
        if (num == 0 || isNaN(num)) {  // .. se num=0 ou é invalido
            alert("Digite um número valido.")
        }
    } while (num == 0 || isNaN(num))
    let pares = `Pares entre 1 e ${num}`
    for (let i = 2; i <= num; i = i + 2 ) {
        pares = pares + i + " , "
    }
    alert(pares)
        

</script>
